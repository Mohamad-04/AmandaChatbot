version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - services/backend/.env
    depends_on:
      - ai_backend
    restart: unless-stopped

  ai_backend:
    build:
      context: services/ai_backend
      dockerfile: Dockerfile.ai
    ports:
      - "8765:8765"
    env_file:
      - services/ai_backend/.env
    restart: unless-stopped
