<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Amanda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap">
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/voice.css">
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Left Sidebar: Chat List -->
        <div class="sidebar-left">
            <div class="sidebar-header">
                <h1>Amanda</h1>
                <p id="user-email" class="user-email"></p>
            </div>
            
            <button id="new-chat-btn" class="btn btn-new-chat">
                + New Chat
            </button>
            
            <div id="chat-list" class="chat-list">
                <!-- Chat items will be dynamically inserted here -->
            </div>
            
            <div class="sidebar-footer">
                <button id="profile-btn" class="btn-icon" title="Profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button id="rename-chat-btn" class="chat-rename-btn" title="Rename chat" style="display: none;">
                        <svg class="chat-rename-icon" viewBox="0 0 512 512">
                            <path d="M410.3 231l11.3-11.3-33.9-33.9-62.1-62.1L291.7 89.8l-11.3 11.3-22.6 22.6L58.6 322.9c-10.4 10.4-18 23.3-22.2 37.4L1 480.7c-2.5 8.4-.2 17.5 6.1 23.7s15.3 8.5 23.7 6.1l120.3-35.4c14.1-4.2 27-11.8 37.4-22.2L387.7 253.7 410.3 231zM160 399.4l-9.1 22.7c-4 3.1-8.5 5.4-13.3 6.9L59.4 452l23-78.1c1.4-4.9 3.8-9.4 6.9-13.3l22.7-9.1v32c0 8.8 7.2 16 16 16h32zM362.7 18.7L348.3 33.2 325.7 55.8 314.3 67.1l33.9 33.9 62.1 62.1 33.9 33.9 11.3-11.3 22.6-22.6 14.5-14.5c25-25 25-65.5 0-90.5L453.3 18.7c-25-25-65.5-25-90.5 0zm-47.4 168l-144 144c-6.2 6.2-16.4 6.2-22.6 0s-6.2-16.4 0-22.6l144-144c6.2-6.2 16.4-6.2 22.6 0s6.2 16.4 0 22.6z"></path>
                        </svg>
                    </button>
                    <button id="delete-chat-btn" class="chat-delete-btn" title="Delete chat" style="display: none;">
                        <svg class="chat-delete-icon" viewBox="0 0 448 512">
                            <path d="M135.2 17.7L128 32H32C14.3 32 0 46.3 0 64S14.3 96 32 96H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H320l-7.2-14.3C307.4 6.8 296.3 0 284.2 0H163.8c-12.1 0-23.2 6.8-28.6 17.7zM416 128H32L53.2 467c1.6 25.3 22.6 45 47.9 45H346.9c25.3 0 46.3-19.7 47.9-45L416 128z"></path>
                        </svg>
                    </button>
                </div>
                <h2 id="chat-title">Select a chat or start a new one</h2>
                <div class="chat-header-right">
                    <button id="voice-chat-btn" class="btn-voice-chat" title="Start voice chat" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                        Voice Chat
                    </button>
                </div>
            </div>
            
            <div id="messages-container" class="messages-container">
                <!-- Messages will be dynamically inserted here -->
                <div id="empty-state" class="empty-state">
                    <h3>What can I help with?</h3>
                    <p>Amanda is here to listen, support, and guide you.</p>
                    <div class="suggestion-chips">
                        <button class="suggestion-chip" onclick="document.getElementById('message-input').value='How are you feeling today?'; document.getElementById('message-input').focus()">How are you feeling today?</button>
                        <button class="suggestion-chip" onclick="document.getElementById('message-input').value='I need someone to talk to'; document.getElementById('message-input').focus()">I need someone to talk to</button>
                        <button class="suggestion-chip" onclick="document.getElementById('message-input').value='Help me process my emotions'; document.getElementById('message-input').focus()">Help me process my emotions</button>
                    </div>
                </div>
            </div>
            
            <!-- Voice Status Indicator -->
            <div id="voice-status" class="voice-status" style="display: none;">
                <span class="recording-dot"></span>
                <span id="recording-time">00:00</span>
                <span id="voice-status-text">Recording...</span>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea
                            id="message-input"
                            placeholder="Message Amanda..."
                            rows="1"
                            disabled
                        ></textarea>
                        <div class="input-actions">
                            <button id="voice-btn" class="btn btn-voice" title="Voice message" disabled>
                                <svg id="voice-icon-mic" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                    <line x1="12" y1="19" x2="12" y2="23"></line>
                                    <line x1="8" y1="23" x2="16" y2="23"></line>
                                </svg>
                                <svg id="voice-icon-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                                    <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                                </svg>
                            </button>
                            <button id="send-btn" class="btn btn-send" disabled>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Sidebar: Profile (hidden by default) -->
        <div id="profile-modal" class="profile-modal" style="display: none;">
            <div class="profile-content">
                <div class="profile-header">
                    <h2>Profile</h2>
                    <button id="close-profile-btn" class="btn-close">&times;</button>
                </div>
                <div class="profile-body">
                    <div class="profile-info">
                        <label>Email</label>
                        <p id="profile-email"></p>
                    </div>
                    <div class="profile-info">
                        <label>Member Since</label>
                        <p id="profile-created"></p>
                    </div>
                    <div class="profile-info profile-info-row">
                        <label>Theme</label>
                        <label class="switch">
                            <input id="theme" type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="profile-footer">
                    <button id="logout-btn" class="btn btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/voice-recorder.js"></script>
    <script src="/static/js/voice-player.js"></script>
    <script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
